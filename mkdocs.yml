site_name: Red Team Notes
site_description: Red teaming and malware development notes for offensive security operators.
site_author: benjugat
copyright: ""

site_url: https://benjugat.github.io/rtnotes/


docs_dir: docs
site_dir: site

exclude_docs: |
  README.md

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  favicon: images/favicon.png
  logo: images/logo_rtnotes.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/benjugat
  generator: false

extra_css:
  - css/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en
      separator: '[\s\-\.\_]+'

use_directory_urls: true

validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore

nav:
  - Home: index.md

  - Red Team:
      - red-team/introduction.md
      - red-team/opsec-infrastructure.md
      - red-team/c2-cobaltstrike.md
      - red-team/host-reconnaissance.md
      - red-team/host-persistence.md
      - red-team/host-privilege-escalation.md
      - red-team/lateral-movement.md
      - red-team/credentials-and-user-impersonation.md
      - red-team/playing-with-tokens.md
      - red-team/kibana.md
      - red-team/pivoting.md
      - red-team/ms-sql-servers.md
      - red-team/data-protection-api.md
      - red-team/laps.md
      - red-team/microsoft-defender.md
      - red-team/application-whitelisting.md
      - red-team/exfiltration.md
  - Malware Development:
      - Basics:
          - malware/basics/tips.md
          - malware/basics/compilation.md
          - malware/basics/encrypting.md
          - malware/basics/data-stoarge.md
          - malware/basics/binary-entropy.md
          - malware/basics/binary-improvements.md
          - malware/basics/iat-parser.md
      - Code Injection:
          - malware/code-injection/intro.md
          - malware/code-injection/section-views.md
          - malware/code-injection/dll-injection.md
          - malware/code-injection/APC-injection.md
          - malware/code-injection/early-bird.md
          - malware/code-injection/srdi.md
      - Hooking:
          - malware/hooking/detour.md
          - malware/hooking/iat-hooking.md
          - malware/hooking/appinit.md
      - Low Priv Evasion:
          - malware/lowpriv-evasion/call-obfuscation.md
          - malware/lowpriv-evasion/ppid-spoofing.md
      - Object Enumeration:
          - malware/object-enumeration/processes.md
          - malware/object-enumeration/threads.md
          - malware/object-enumeration/modules.md
          - malware/object-enumeration/handle.md